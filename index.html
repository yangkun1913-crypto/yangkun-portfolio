<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>许洋堃 · 作品集</title>
<style>
  :root {
    --bg: #f2f0eb;
    --card: #fff;
    --text: #5f584e;
    --text-active: #1f1a14;
    --border: #e8e3da;
    --shadow: rgba(140, 130, 115, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    overflow-y: scroll;
    overflow-x: hidden;
  }

  /* ── Splash Page ── */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    padding: 60px;
  }

  .splash.hide { opacity: 0; pointer-events: none; visibility: hidden; }

  .splash-inner {
    display: flex;
    align-items: center;
    gap: 80px;
    max-width: 1000px;
    width: 100%;
    opacity: 0;
    transform: translateY(20px);
    animation: splashReveal 0.9s 0.15s forwards ease;
  }

  .splash-photo {
    flex-shrink: 0;
    width: 360px;
    height: 360px;
    border-radius: 4px;
    overflow: hidden;
  }

  .splash-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .splash-text {
    flex: 1;
    min-width: 0;
    text-align: left;
  }

  .splash-name {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #000;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .splash-title {
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #666;
    margin-bottom: 4px;
  }

  .splash-meta {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #999;
    margin-bottom: 32px;
  }

  .splash-services {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #555;
    margin-bottom: 12px;
  }

  .splash-brands {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: #888;
    margin-bottom: 8px;
    line-height: 1.6;
  }

  .splash-contact {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #333;
    margin-bottom: 40px;
  }

  .splash-enter {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: #333;
    padding: 0;
    border: none;
    border-bottom: 1px solid #333;
    border-radius: 0;
    background: none;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.3s ease;
  }

  .splash-enter:hover { opacity: 0.5; }

  @keyframes splashReveal { to { opacity: 1; transform: translateY(0); } }

  /* ── Mobile Splash ── */
  @media (max-width: 767px) {
    .splash { padding: 32px 24px; align-items: flex-start; }
    .splash-inner { flex-direction: column; gap: 32px; }
    .splash-photo { width: 200px; height: 200px; }
    .splash-name { font-size: 26px; }
    .splash-title { font-size: 14px; }
    .splash-meta { font-size: 12px; margin-bottom: 24px; }
    .splash-services { font-size: 12px; }
    .splash-brands { font-size: 11px; }
    .splash-contact { font-size: 12px; margin-bottom: 28px; }
  }

  /* ── Category Filter ── */
  .filter {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 99;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 48px;
    padding: 36px 24px 12px;
    background: linear-gradient(180deg, rgba(242,240,235,0.97) 0%, rgba(242,240,235,0.85) 60%, transparent 100%);
  }

  /* ── Intro Return Button ── */
  .intro-return {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    font-family: inherit;
    opacity: 0.55;
    transition: opacity 0.35s ease;
  }

  .intro-return:hover { opacity: 1; }

  .intro-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }

  .intro-label {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  @media (max-width: 767px) {
    .filter { gap: 28px; padding: 24px 16px 20px; }
    .filter-btn { font-size: 13px; letter-spacing: 0.08em; }
    .intro-return { left: 12px; }
    .intro-avatar { width: 24px; height: 24px; }
    .intro-label { display: none; }
  }

  .filter-btn {
    background: none; border: none;
    color: var(--text);
    font-size: 14px; font-weight: 300; letter-spacing: 0.12em;
    cursor: pointer; padding: 6px 0;
    position: relative;
    transition: color 0.5s ease;
    font-family: inherit;
  }

  .filter-btn::after {
    content: ''; position: absolute; bottom: 0; left: 50%; width: 60%; height: 1px;
    background: var(--text-active);
    transform: translateX(-50%) scaleX(0);
    transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .filter-btn:hover { color: var(--text-active); }
  .filter-btn.active { color: var(--text-active); font-weight: 400; }
  .filter-btn.active::after { transform: translateX(-50%) scaleX(1); }

  @media (max-width: 767px) {
    .filter { gap: 36px; padding: 24px 16px 20px; }
    .filter-btn { font-size: 13px; letter-spacing: 0.08em; }
  }

  /* ── Sub Filter ── */
  .sub-filter {
    position: fixed; top: 72px; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: center; gap: 40px;
    padding: 4px 24px 8px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }

  .sub-filter.active { opacity: 1; pointer-events: auto; }

  .sub-filter-btn {
    background: none; border: none;
    color: var(--text); font-size: 12px; font-weight: 300; letter-spacing: 0.1em;
    cursor: pointer; padding: 3px 0;
    transition: color 0.4s ease, opacity 0.4s ease;
    font-family: inherit; opacity: 0.6;
  }

  .sub-filter-btn:hover,
  .sub-filter-btn.active { opacity: 1; color: var(--text-active); }

  @media (max-width: 767px) {
    .sub-filter { top: 60px; gap: 28px; }
    .sub-filter-btn { font-size: 11px; }
  }

  /* ── Gallery: Pinterest 风格瀑布流 ── */
  .gallery {
    column-count: 2;
    column-gap: 8px;
    padding: 130px 8px 20px;
    max-width: 2400px;
    margin: 0 auto;
    min-height: 100vh;
  }

  @media (min-width: 768px) {
    .gallery { column-count: 3; column-gap: 10px; padding: 140px 10px 28px; }
  }

  @media (min-width: 1200px) {
    .gallery { column-count: 5; column-gap: 12px; padding: 150px 14px 36px; }
  }

  @media (min-width: 1800px) {
    .gallery { column-count: 6; column-gap: 14px; padding: 160px 18px 44px; }
  }

  /* ── Gallery Item ── */
  .gallery-item {
    break-inside: avoid;
    margin-bottom: 8px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1s ease, transform 1s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  @media (min-width: 768px) { .gallery-item { margin-bottom: 10px; } }
  @media (min-width: 1200px) { .gallery-item { margin-bottom: 12px; } }

  .gallery-item.hidden { display: none; }
  .gallery-item.visible { opacity: 1; transform: translateY(0); }

  .gallery-item .card {
    background: transparent;
    padding: 0;
    border-radius: 8px;
    box-shadow: none;
    transition: transform 0.4s ease, filter 0.4s ease;
  }

  @media (min-width: 768px) {
    .gallery-item .card { border-radius: 10px; }
  }

  /* ── Hover 放大 ── */
  .gallery-item:hover {
    z-index: 10;
    position: relative;
  }

  .gallery-item:hover .card {
    transform: scale(1.05);
    filter: brightness(1.05);
  }

  .gallery-item .image-wrap {
    position: relative;
    overflow: hidden;
    background: transparent;
    border-radius: 8px;
    line-height: 0;
  }

  @media (min-width: 768px) {
    .gallery-item .image-wrap { border-radius: 10px; }
  }

  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
  }

  @media (min-width: 768px) {
    .gallery-item img { border-radius: 10px; }
  }

  /* Shimmer */
  .gallery-item .shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, #e8e3da 25%, #ddd8cf 50%, #e8e3da 75%);
    background-size: 200% 100%;
    animation: shimmer 1.8s infinite;
    z-index: 1;
    transition: opacity 0.5s ease;
  }

  .gallery-item.loaded .shimmer { opacity: 0; pointer-events: none; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(242, 240, 235, 0.97);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .lightbox.active { opacity: 1; pointer-events: auto; }

  .lightbox-image-wrapper {
    position: relative;
    max-width: 92vw; max-height: 92vh;
    background: transparent;
    padding: 0;
    box-shadow: none;
    transform: scale(0.93);
    transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .lightbox.active .lightbox-image-wrapper { transform: scale(1); }

  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; display: block; }

  .lightbox-close {
    position: fixed; top: 28px; right: 32px;
    width: 48px; height: 48px;
    border: none; background: none;
    cursor: pointer; z-index: 1001;
    opacity: 0.4; transition: opacity 0.35s ease;
  }
  .lightbox-close:hover { opacity: 0.8; }
  .lightbox-close::before, .lightbox-close::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 22px; height: 1px; background: var(--text-active);
  }
  .lightbox-close::before { transform: translate(-50%,-50%) rotate(45deg); }
  .lightbox-close::after  { transform: translate(-50%,-50%) rotate(-45deg); }

  .lightbox-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px;
    border: none; background: rgba(92,86,77,0.04);
    cursor: pointer; z-index: 1001;
    opacity: 0.35; transition: opacity 0.35s ease, background 0.35s ease;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-nav:hover { opacity: 0.8; background: rgba(92,86,77,0.08); }
  .lightbox-nav.prev { left: 24px; }
  .lightbox-nav.next { right: 24px; }
  .lightbox-nav::before {
    content: ''; width: 10px; height: 10px;
    border-left: 1.5px solid var(--text-active);
    border-top: 1.5px solid var(--text-active);
  }
  .lightbox-nav.prev::before { transform: rotate(-45deg); margin-left: 3px; }
  .lightbox-nav.next::before { transform: rotate(135deg); margin-right: 3px; }

  .lightbox-counter {
    position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
    z-index: 1001; color: var(--text); font-size: 13px;
    font-weight: 300; letter-spacing: 0.1em;
  }

  @media (max-width: 767px) {
    .lightbox-image-wrapper { padding: 0; }
    .lightbox-nav { width: 36px; height: 36px; }
    .lightbox-nav.prev { left: 8px; }
    .lightbox-nav.next { right: 8px; }
    .lightbox-nav::before { width: 8px; height: 8px; }
    .lightbox-close { top: 12px; right: 12px; }
    .lightbox-counter { bottom: 20px; font-size: 12px; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd8cf; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #ccc5bb; }

  .app { display: none; }
  .app.show { display: block; }
</style>
</head>

<!-- Splash -->

  </nav>

  <div class="gallery" id="gallery"></div>

  <!-- Lightbox -->

    <button class="lightbox-nav prev" id="lightboxPrev"></button>
    <button class="lightbox-nav next" id="lightboxNext"></button>

    </div>
  </div>

</div>

<script>

const splash = document.getElementById('splash');
const app = document.getElementById('app');
const splashEnter = document.getElementById('splashEnter');
const introReturn = document.getElementById('introReturn');

function enterSite() {
  splash.classList.add('hide');
  app.classList.add('show');
  document.body.style.overflow = '';
  if (!gallery.children.length) renderGallery();
}

function returnToIntro() {
  splash.classList.remove('hide');
  app.classList.remove('show');
  document.body.style.overflow = 'hidden';
}

splash.addEventListener('click', (e) => { if (e.target === splash) enterSite(); });
splashEnter.addEventListener('click', enterSite);
introReturn.addEventListener('click', returnToIntro);

// ── State ──
let currentCategory = 'all';
let currentFolder = 'all';
let filteredPhotos = [...photos];

// ── Build Gallery ──
const gallery = document.getElementById('gallery');

function renderGallery() {
  gallery.innerHTML = '';

  filteredPhotos.forEach((photo, index) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';

    const card = document.createElement('div');
    card.className = 'card';

    const imageWrap = document.createElement('div');
    imageWrap.className = 'image-wrap';

    const shimmer = document.createElement('div');
    shimmer.className = 'shimmer';

    const img = document.createElement('img');
    img.dataset.src = photo.url;
    img.alt = '';
    img.style.aspectRatio = `${photo.w} / ${photo.h}`;
    img.onload = () => item.classList.add('loaded');
    img.onerror = () => item.classList.add('loaded');

    imageWrap.appendChild(shimmer);
    imageWrap.appendChild(img);
    card.appendChild(imageWrap);
    item.appendChild(card);
    item.addEventListener('click', () => openLightbox(index));
    gallery.appendChild(item);
  });

  // 分批加载：每批6张，间隔200ms，避免浏览器并发连接限制
  const items = document.querySelectorAll('.gallery-item');
  const BATCH = 6;
  const DELAY = 200;

  function loadAt(i) {
    if (i >= items.length) return;
    const img = items[i].querySelector('img');
    if (img && img.dataset.src) {
      img.src = img.dataset.src;
      img.removeAttribute('data-src');
      items[i].classList.add('visible');
    }
    if ((i + 1) % BATCH === 0) {
      setTimeout(() => loadAt(i + 1), DELAY);
    } else {
      loadAt(i + 1);
    }
  }

  loadAt(0);
}

// ── Filter ──
const subFilter = document.getElementById('subFilter');

function getFoldersForCategory(cat) {
  const folders = new Set();
  photos.filter(p => p.category === cat).forEach(p => folders.add(p.folder));
  return [...folders];
}

function buildSubFilter(cat) {
  subFilter.innerHTML = '';
  if (cat === 'all' || cat === 'portrait' || cat === 'still') {
    subFilter.classList.remove('active');
    return;
  }
  const folders = getFoldersForCategory(cat);
  if (folders.length <= 1) { subFilter.classList.remove('active'); return; }

  const allBtn = document.createElement('button');
  allBtn.className = 'sub-filter-btn active';
  allBtn.dataset.folder = 'all';
  allBtn.textContent = '全部';
  allBtn.addEventListener('click', () => {
    document.querySelectorAll('.sub-filter-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    currentFolder = 'all';
    applyFilter();
  });
  subFilter.appendChild(allBtn);

  folders.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'sub-filter-btn';
    btn.dataset.folder = f;
    btn.textContent = f;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sub-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFolder = f;
      applyFilter();
    });
    subFilter.appendChild(btn);
  });

  subFilter.classList.add('active');
}

function applyFilter() {
  if (currentCategory === 'all') {
    filteredPhotos = [...photos];
  } else {
    filteredPhotos = photos.filter(p => {
      if (p.category !== currentCategory) return false;
      if (currentFolder !== 'all' && p.folder !== currentFolder) return false;
      return true;
    });
  }
  renderGallery();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.category;
    currentFolder = 'all';
    buildSubFilter(currentCategory);
    applyFilter();
  });
});




// ── Lightbox ──
let currentIndex = 0;
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
const lightboxCounter = document.getElementById('lightboxCounter');
const lbClose = document.getElementById('lightboxClose');
const lbPrev = document.getElementById('lightboxPrev');
const lbNext = document.getElementById('lightboxNext');

function updateCounter() { lightboxCounter.textContent = `${currentIndex + 1} / ${filteredPhotos.length}`; }

function openLightbox(index) {
  currentIndex = index;
  lightboxImage.src = filteredPhotos[index].url;
  updateCounter();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
  setTimeout(() => { lightboxImage.src = ''; }, 500);
}

function prevImage() {
  currentIndex = (currentIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
  animateTransition(() => {
    lightboxImage.src = filteredPhotos[currentIndex].url;
    updateCounter();
  });
}

function nextImage() {
  currentIndex = (currentIndex + 1) % filteredPhotos.length;
  animateTransition(() => {
    lightboxImage.src = filteredPhotos[currentIndex].url;
    updateCounter();
  });
}

function animateTransition(callback) {
  lightboxImage.style.opacity = '0';
  lightboxImage.style.transform = 'scale(0.97)';
  setTimeout(() => {
    callback();
    lightboxImage.style.opacity = '1';
    lightboxImage.style.transform = 'scale(1)';
  }, 250);
}

lightboxImage.style.transition = 'opacity 0.25s ease, transform 0.25s ease';

lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', prevImage);
lbNext.addEventListener('click', nextImage);
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') prevImage();
  if (e.key === 'ArrowRight') nextImage();
});

let touchStartX = 0, touchStartY = 0;
lightbox.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
lightbox.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    dx > 0 ? prevImage() : nextImage();
  }
});
</script>
