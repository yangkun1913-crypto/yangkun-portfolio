<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>许洋堃 · 作品集</title>
<style>
  :root {
    --bg: #f6f4ef;
    --surface: #fffdf8;
    --text: #6e675d;
    --text-active: #15130f;
    --muted: #a29a8e;
    --border: #ded8cd;
    --line: rgba(21, 19, 15, 0.14);
    --scrim: rgba(10, 9, 7, 0.44);
    --focus: #15130f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text-active);
    font-family: "PingFang SC", "Noto Sans SC", "Hiragino Sans GB", "Helvetica Neue", Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
    overflow-y: scroll;
    overflow-x: hidden;
  }

  button {
    font: inherit;
    color: inherit;
  }

  button:focus-visible,
  .gallery-item:focus-visible {
    outline: 1px solid var(--focus);
    outline-offset: 5px;
  }

  /* ── Splash Page ── */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #10100d;
    display: grid;
    align-items: end;
    cursor: default;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    padding: clamp(28px, 5vw, 72px);
    overflow: hidden;
  }

  .splash::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(8,7,5,0.76) 0%, rgba(8,7,5,0.46) 38%, rgba(8,7,5,0.12) 72%),
                linear-gradient(180deg, rgba(8,7,5,0.1) 0%, rgba(8,7,5,0.28) 100%);
    z-index: 1;
  }

  .splash.hide { opacity: 0; pointer-events: none; visibility: hidden; }

  .splash-photo {
    position: absolute;
    inset: 0;
  }

  .splash-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 38%;
    display: block;
  }

  .splash-inner {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: minmax(0, 760px) minmax(180px, 1fr);
    align-items: end;
    gap: clamp(32px, 8vw, 120px);
    max-width: 1480px;
    width: 100%;
    opacity: 0;
    transform: translateY(18px);
    animation: splashReveal 0.8s 0.12s forwards ease;
  }

  .splash-text {
    min-width: 0;
    text-align: left;
    color: #fffaf0;
  }

  .splash-kicker {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,250,240,0.72);
    margin-bottom: clamp(20px, 4vw, 44px);
  }

  .splash-name {
    font-family: inherit;
    font-size: clamp(56px, 10vw, 154px);
    font-weight: 500;
    letter-spacing: 0;
    color: #fffaf0;
    line-height: 0.92;
    margin-bottom: clamp(18px, 2.5vw, 34px);
  }

  .splash-title {
    font-size: clamp(17px, 2vw, 28px);
    font-weight: 300;
    line-height: 1.45;
    letter-spacing: 0.03em;
    color: rgba(255,250,240,0.9);
    max-width: 620px;
    margin-bottom: clamp(22px, 4vw, 52px);
  }

  .splash-details {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    max-width: 700px;
    border-top: 1px solid rgba(255,250,240,0.28);
    padding-top: 18px;
  }

  .splash-detail span {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    color: rgba(255,250,240,0.56);
    margin-bottom: 8px;
  }

  .splash-detail strong {
    display: block;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.7;
    color: rgba(255,250,240,0.88);
  }

  .splash-side {
    color: rgba(255,250,240,0.76);
    justify-self: end;
    max-width: 260px;
    border-left: 1px solid rgba(255,250,240,0.24);
    padding-left: 24px;
  }

  .splash-side p {
    font-size: 13px;
    line-height: 1.8;
    letter-spacing: 0.04em;
    margin-bottom: 28px;
  }

  .splash-enter {
    min-height: 44px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.16em;
    color: #fffaf0;
    padding: 0 0 3px;
    border: 0;
    border-bottom: 1px solid rgba(255,250,240,0.76);
    border-radius: 0;
    background: none;
    cursor: pointer;
    transition: opacity 0.25s ease, border-color 0.25s ease;
  }

  .splash-enter:hover { opacity: 0.68; border-color: rgba(255,250,240,0.42); }

  @keyframes splashReveal { to { opacity: 1; transform: translateY(0); } }

  /* ── Mobile Splash ── */
  @media (max-width: 767px) {
    .splash { min-height: 100dvh; padding: 28px 22px 34px; }
    .splash::before {
      background: linear-gradient(180deg, rgba(8,7,5,0.18) 0%, rgba(8,7,5,0.82) 72%, rgba(8,7,5,0.9) 100%);
    }
    .splash-photo img { object-position: center top; }
    .splash-inner { grid-template-columns: 1fr; gap: 28px; }
    .splash-kicker { font-size: 10px; margin-bottom: 22px; }
    .splash-name { font-size: clamp(48px, 18vw, 76px); }
    .splash-title { font-size: 16px; max-width: 330px; }
    .splash-details { grid-template-columns: 1fr; gap: 14px; padding-top: 16px; }
    .splash-side { justify-self: start; border-left: 0; padding-left: 0; max-width: 330px; }
    .splash-side p { margin-bottom: 18px; }
  }

  /* ── Category Filter ── */
  .filter {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 99;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(18px, 4vw, 52px);
    padding: 26px clamp(18px, 4vw, 52px) 18px;
    background: rgba(246,244,239,0.9);
    border-bottom: 1px solid rgba(21,19,15,0.08);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  /* ── Intro Return Button ── */
  .intro-return {
    position: absolute;
    left: clamp(16px, 3vw, 38px);
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    opacity: 0.72;
    transition: opacity 0.25s ease;
  }

  .intro-return:hover { opacity: 1; }

  .intro-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    border: 1px solid rgba(21,19,15,0.16);
  }

  .intro-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--text);
  }

  @media (max-width: 767px) {
    .filter {
      justify-content: flex-start;
      gap: 18px;
      padding: 18px 14px 14px 62px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter::-webkit-scrollbar { display: none; }
    .intro-return { left: 12px; }
    .intro-avatar { width: 28px; height: 28px; }
    .intro-label { display: none; }
  }

  .filter-btn {
    background: none; border: none;
    color: var(--text);
    font-size: 12px; font-weight: 500; letter-spacing: 0.16em;
    cursor: pointer; padding: 8px 0;
    position: relative;
    white-space: nowrap;
    min-height: 44px;
    transition: color 0.25s ease;
  }

  .filter-btn::after {
    content: ''; position: absolute; bottom: 0; left: 50%; width: 60%; height: 1px;
    background: var(--text-active);
    transform: translateX(-50%) scaleX(0);
    transition: transform 0.25s ease;
  }

  .filter-btn:hover { color: var(--text-active); }
  .filter-btn.active { color: var(--text-active); }
  .filter-btn.active::after { transform: translateX(-50%) scaleX(1); }

  @media (max-width: 767px) {
    .filter-btn { font-size: 11px; letter-spacing: 0.12em; }
  }

  /* ── Sub Filter ── */
  .sub-filter {
    position: fixed; top: 70px; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: center; gap: 40px;
    padding: 12px 24px 10px;
    opacity: 0; pointer-events: none;
    background: rgba(246,244,239,0.82);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    transition: opacity 0.25s ease;
  }

  .sub-filter.active { opacity: 1; pointer-events: auto; }

  .sub-filter-btn {
    background: none; border: none;
    color: var(--text); font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    cursor: pointer; padding: 8px 0;
    min-height: 36px;
    transition: color 0.25s ease, opacity 0.25s ease;
    opacity: 0.62;
  }

  .sub-filter-btn:hover,
  .sub-filter-btn.active { opacity: 1; color: var(--text-active); }

  @media (max-width: 767px) {
    .sub-filter {
      top: 61px;
      justify-content: flex-start;
      gap: 22px;
      padding: 8px 14px 8px 62px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .sub-filter::-webkit-scrollbar { display: none; }
    .sub-filter-btn { font-size: 11px; }
  }

  /* ── Gallery: Pinterest 风格瀑布流 ── */
  .gallery {
    column-count: 2;
    column-gap: 10px;
    padding: 112px 10px 28px;
    max-width: 1720px;
    margin: 0 auto;
    min-height: 100vh;
  }

  @media (min-width: 768px) {
    .gallery { column-count: 3; column-gap: 14px; padding: 118px 16px 44px; }
  }

  @media (min-width: 1200px) {
    .gallery { column-count: 4; column-gap: 18px; padding: 124px 24px 60px; }
  }

  @media (min-width: 1800px) {
    .gallery { column-count: 5; column-gap: 20px; padding: 130px 28px 72px; }
  }

  /* ── Gallery Item ── */
  .gallery-item {
    break-inside: avoid;
    margin-bottom: 10px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.42s ease, transform 0.42s ease;
  }

  @media (min-width: 768px) { .gallery-item { margin-bottom: 14px; } }
  @media (min-width: 1200px) { .gallery-item { margin-bottom: 18px; } }

  .gallery-item.hidden { display: none; }
  .gallery-item.visible { opacity: 1; transform: translateY(0); }

  .gallery-item .card {
    background: transparent;
    padding: 0;
    border-radius: 2px;
    box-shadow: none;
    transition: transform 0.28s ease, filter 0.28s ease;
  }

  /* ── Hover 放大 ── */
  .gallery-item:hover {
    z-index: 10;
    position: relative;
  }

  .gallery-item:hover .card {
    transform: translateY(-3px);
    filter: brightness(1.03) contrast(1.02);
  }

  .gallery-item .image-wrap {
    position: relative;
    overflow: hidden;
    background: #e8e2d8;
    border-radius: 2px;
    line-height: 0;
  }

  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 2px;
  }

  /* Shimmer */
  .gallery-item .shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, #e4ded3 25%, #d8d1c5 50%, #e4ded3 75%);
    background-size: 200% 100%;
    animation: shimmer 1.8s infinite;
    z-index: 1;
    transition: opacity 0.5s ease;
  }

  .gallery-item.loaded .shimmer { opacity: 0; pointer-events: none; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(16, 15, 12, 0.88);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .lightbox.active { opacity: 1; pointer-events: auto; }

  .lightbox-image-wrapper {
    position: relative;
    max-width: 92vw; max-height: 92vh;
    background: transparent;
    padding: 0;
    box-shadow: none;
    transform: scale(0.98);
    transition: transform 0.25s ease;
  }

  .lightbox.active .lightbox-image-wrapper { transform: scale(1); }

  .lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; display: block; }

  .lightbox-close {
    position: fixed; top: 28px; right: 32px;
    width: 48px; height: 48px;
    border: none; background: none;
    cursor: pointer; z-index: 1001;
    opacity: 0.68; transition: opacity 0.25s ease;
  }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-close::before, .lightbox-close::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 22px; height: 1px; background: #fffaf0;
  }
  .lightbox-close::before { transform: translate(-50%,-50%) rotate(45deg); }
  .lightbox-close::after  { transform: translate(-50%,-50%) rotate(-45deg); }

  .lightbox-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px;
    border: 1px solid rgba(255,250,240,0.18);
    background: rgba(255,250,240,0.06);
    cursor: pointer; z-index: 1001;
    opacity: 0.72; transition: opacity 0.25s ease, background 0.25s ease;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-nav:hover { opacity: 1; background: rgba(255,250,240,0.12); }
  .lightbox-nav.prev { left: 24px; }
  .lightbox-nav.next { right: 24px; }
  .lightbox-nav::before {
    content: ''; width: 10px; height: 10px;
    border-left: 1.5px solid #fffaf0;
    border-top: 1.5px solid #fffaf0;
  }
  .lightbox-nav.prev::before { transform: rotate(-45deg); margin-left: 3px; }
  .lightbox-nav.next::before { transform: rotate(135deg); margin-right: 3px; }

  .lightbox-counter {
    position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
    z-index: 1001; color: rgba(255,250,240,0.72); font-size: 12px;
    font-weight: 400; letter-spacing: 0.14em;
  }

  @media (max-width: 767px) {
    .gallery { padding-top: 92px; }
    .lightbox-image-wrapper { padding: 0; }
    .lightbox-nav { width: 36px; height: 36px; }
    .lightbox-nav.prev { left: 8px; }
    .lightbox-nav.next { right: 8px; }
    .lightbox-nav::before { width: 8px; height: 8px; }
    .lightbox-close { top: 12px; right: 12px; }
    .lightbox-counter { bottom: 20px; font-size: 12px; }
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbc3b6; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #afa697; }

  .app { display: none; }
  .app.show { display: block; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
    }
    .gallery-item { transform: none; }
    .gallery-item .shimmer { animation: none; }
  }
</style>
</head>
<body>

<!-- Splash -->
<div class="splash" id="splash">
  <div class="splash-photo">
    <img src="许洋堃.PNG" alt="许洋堃">
  </div>
  <div class="splash-inner">
    <div class="splash-text">
      <div class="splash-kicker">Xu Yangkun Photography</div>
      <div class="splash-name">许洋堃</div>
      <div class="splash-title">商业摄影师，以克制的画面秩序完成艺人、人像与静物影像。</div>
      <div class="splash-details">
        <div class="splash-detail"><span>BASE</span><strong>杭州 · 从业 5 年</strong></div>

    </div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">

  <nav class="filter" id="filter">
    <button class="intro-return" id="introReturn" title="关于许洋堃" aria-label="返回关于许洋堃">
      <span class="intro-avatar" style="background-image:url('作品集-web/avatar.jpg')"></span>
      <span class="intro-label">关于</span>
    </button>
    <button class="filter-btn active" data-category="all">全部</button>
    <button class="filter-btn" data-category="artist">艺人拍摄</button>
    <button class="filter-btn" data-category="portrait">人像拍摄</button>
    <button class="filter-btn" data-category="still">静物拍摄</button>
  </nav>

  <nav class="sub-filter" id="subFilter"></nav>

  <main>
    <div class="gallery" id="gallery" aria-label="摄影作品集"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog" aria-label="作品预览">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭预览"></button>
    <button class="lightbox-nav prev" id="lightboxPrev" aria-label="上一张"></button>
    <button class="lightbox-nav next" id="lightboxNext" aria-label="下一张"></button>
    <span class="lightbox-counter" id="lightboxCounter" aria-live="polite"></span>
    <div class="lightbox-image-wrapper">
      <img id="lightboxImage" src="" alt="">
    </div>
  </div>

</div>

<script>
// ── Splash ──
const splash = document.getElementById('splash');
const app = document.getElementById('app');
const splashEnter = document.getElementById('splashEnter');
const introReturn = document.getElementById('introReturn');

function enterSite() {
  splash.classList.add('hide');
  app.classList.add('show');
  document.body.style.overflow = '';
  if (!gallery.children.length) renderGallery();
}

function returnToIntro() {
  splash.classList.remove('hide');
  app.classList.remove('show');
  document.body.style.overflow = 'hidden';
}

splash.addEventListener('click', (e) => { if (e.target === splash) enterSite(); });
splashEnter.addEventListener('click', enterSite);
introReturn.addEventListener('click', returnToIntro);

// ── State ──
let currentCategory = 'all';
let currentFolder = 'all';
let filteredPhotos = [...photos];
const categoryLabels = {
  artist: '艺人拍摄',
  portrait: '人像拍摄',
  still: '静物拍摄'
};

function getPhotoLabel(photo, index) {
  const category = categoryLabels[photo.category] || '摄影作品';
  const folder = photo.folder ? `${photo.folder} · ` : '';
  return `${folder}${category}作品 ${index + 1}`;
}

// ── Build Gallery ──
const gallery = document.getElementById('gallery');

function renderGallery() {
  gallery.innerHTML = '';

  filteredPhotos.forEach((photo, index) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.setAttribute('role', 'button');
    item.setAttribute('tabindex', '0');
    item.setAttribute('aria-label', `打开${getPhotoLabel(photo, index)}`);

    const card = document.createElement('div');
    card.className = 'card';

    const imageWrap = document.createElement('div');
    imageWrap.className = 'image-wrap';

    const shimmer = document.createElement('div');
    shimmer.className = 'shimmer';

    const img = document.createElement('img');
    img.dataset.src = photo.url;
    img.alt = getPhotoLabel(photo, index);
    img.style.aspectRatio = `${photo.w} / ${photo.h}`;
    img.onload = () => item.classList.add('loaded');
    img.onerror = () => item.classList.add('loaded');

    imageWrap.appendChild(shimmer);
    imageWrap.appendChild(img);
    card.appendChild(imageWrap);
    item.appendChild(card);
    item.addEventListener('click', () => openLightbox(index));
    item.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openLightbox(index);
      }
    });
    gallery.appendChild(item);
  });

  // 分批加载：每批6张，间隔200ms，避免浏览器并发连接限制
  const items = document.querySelectorAll('.gallery-item');
  const BATCH = 6;
  const DELAY = 200;

  function loadAt(i) {
    if (i >= items.length) return;
    const img = items[i].querySelector('img');
    if (img && img.dataset.src) {
      img.src = img.dataset.src;
      img.removeAttribute('data-src');
      items[i].classList.add('visible');
    }
    if ((i + 1) % BATCH === 0) {
      setTimeout(() => loadAt(i + 1), DELAY);
    } else {
      loadAt(i + 1);
    }
  }

  loadAt(0);
}

// ── Filter ──
const subFilter = document.getElementById('subFilter');

function getFoldersForCategory(cat) {
  const folders = new Set();
  photos.filter(p => p.category === cat).forEach(p => folders.add(p.folder));
  return [...folders];
}

function buildSubFilter(cat) {
  subFilter.innerHTML = '';
  if (cat === 'all' || cat === 'portrait' || cat === 'still') {
    subFilter.classList.remove('active');
    return;
  }
  const folders = getFoldersForCategory(cat);
  if (folders.length <= 1) { subFilter.classList.remove('active'); return; }

  const allBtn = document.createElement('button');
  allBtn.className = 'sub-filter-btn active';
  allBtn.dataset.folder = 'all';
  allBtn.textContent = '全部';
  allBtn.setAttribute('aria-pressed', 'true');
  allBtn.addEventListener('click', () => {
    document.querySelectorAll('.sub-filter-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
    });
    allBtn.classList.add('active');
    allBtn.setAttribute('aria-pressed', 'true');
    currentFolder = 'all';
    applyFilter();
  });
  subFilter.appendChild(allBtn);

  folders.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'sub-filter-btn';
    btn.dataset.folder = f;
    btn.textContent = f;
    btn.setAttribute('aria-pressed', 'false');
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sub-filter-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-pressed', 'true');
      currentFolder = f;
      applyFilter();
    });
    subFilter.appendChild(btn);
  });

  subFilter.classList.add('active');
}

function applyFilter() {
  if (currentCategory === 'all') {
    filteredPhotos = [...photos];
  } else {
    filteredPhotos = photos.filter(p => {
      if (p.category !== currentCategory) return false;
      if (currentFolder !== 'all' && p.folder !== currentFolder) return false;
      return true;
    });
  }
  renderGallery();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.setAttribute('aria-pressed', btn.classList.contains('active') ? 'true' : 'false');
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
    currentCategory = btn.dataset.category;
    currentFolder = 'all';
    buildSubFilter(currentCategory);
    applyFilter();
  });
});




// ── Lightbox ──
let currentIndex = 0;
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
const lightboxCounter = document.getElementById('lightboxCounter');
const lbClose = document.getElementById('lightboxClose');
const lbPrev = document.getElementById('lightboxPrev');
const lbNext = document.getElementById('lightboxNext');

function updateCounter() { lightboxCounter.textContent = `${currentIndex + 1} / ${filteredPhotos.length}`; }

function openLightbox(index) {
  currentIndex = index;
  lightboxImage.src = filteredPhotos[index].url;
  lightboxImage.alt = getPhotoLabel(filteredPhotos[index], currentIndex);
  updateCounter();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
  setTimeout(() => {
    lightboxImage.src = '';
    lightboxImage.alt = '';
  }, 500);
}

function prevImage() {
  currentIndex = (currentIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
  animateTransition(() => {
    lightboxImage.src = filteredPhotos[currentIndex].url;
    lightboxImage.alt = getPhotoLabel(filteredPhotos[currentIndex], currentIndex);
    updateCounter();
  });
}

function nextImage() {
  currentIndex = (currentIndex + 1) % filteredPhotos.length;
  animateTransition(() => {
    lightboxImage.src = filteredPhotos[currentIndex].url;
    lightboxImage.alt = getPhotoLabel(filteredPhotos[currentIndex], currentIndex);
    updateCounter();
  });
}

function animateTransition(callback) {
  lightboxImage.style.opacity = '0';
  lightboxImage.style.transform = 'scale(0.97)';
  setTimeout(() => {
    callback();
    lightboxImage.style.opacity = '1';
    lightboxImage.style.transform = 'scale(1)';
  }, 250);
}

lightboxImage.style.transition = 'opacity 0.25s ease, transform 0.25s ease';

lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', prevImage);
lbNext.addEventListener('click', nextImage);
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') prevImage();
  if (e.key === 'ArrowRight') nextImage();
});

let touchStartX = 0, touchStartY = 0;
lightbox.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
lightbox.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    dx > 0 ? prevImage() : nextImage();
  }
});
</script>
